<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Rhythm</title>
  <meta name="description" content="A personal life tracker. It remembers what you did and when — gently, and without pressure." />

  <meta name="theme-color" content="#F7F0E8" />
  <meta name="color-scheme" content="light dark" />

  <!-- iOS install support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Rhythm" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />

  <link rel="icon" type="image/png" href="./icons/favicon-64.png" />
  <link rel="manifest" href="./manifest.webmanifest" />

  <!-- fonts: League Spartan (headings) · Inter (body) · Caveat (handwriting) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@500;600;700&family=Inter:wght@400;500;600&family=Caveat:wght@500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <main id="app" aria-live="polite"></main>
  <nav id="nav" aria-label="Main"></nav>

  <noscript>
    <p style="padding: 40px 24px; text-align: center; font-family: system-ui;">
      Rhythm needs JavaScript to remember things for you.
    </p>
  </noscript>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
